trigger:
  branches:
    include:
      - main
      - master

pr:
  branches:
    include:
      - main
      - master

pool:
  vmImage: ubuntu-latest

variables:
  buildConfiguration: Release
  solution: dotnet-hello-world.sln
  webProject: hello-world-api/hello-world-api.csproj
  testProject: hello-world-api.Tests/hello-world-api.Tests.csproj

steps:
  - checkout: self
    clean: true

  - task: UseDotNet@2
    displayName: Install .NET 10 SDK
    inputs:
      packageType: sdk
      version: 10.x

  - script: dotnet --info
    displayName: Show .NET information

  - task: DotNetCoreCLI@2
    displayName: Restore
    inputs:
      command: restore
      projects: $(solution)

  - task: DotNetCoreCLI@2
    displayName: Build
    inputs:
      command: build
      projects: $(solution)
      arguments: --configuration $(buildConfiguration) --no-restore

  - task: DotNetCoreCLI@2
    displayName: Test
    inputs:
      command: test
      projects: $(testProject)
      arguments: --configuration $(buildConfiguration) --no-build --no-restore --logger trx
      publishTestResults: true

  - task: DotNetCoreCLI@2
    displayName: Publish application
    inputs:
      command: publish
      publishWebProjects: false
      projects: $(webProject)
      arguments: --configuration $(buildConfiguration) --no-build --no-restore --output $(Build.ArtifactStagingDirectory)/publish
      zipAfterPublish: false

  - task: ArchiveFiles@2
    displayName: Create deployment ZIP
    inputs:
      rootFolderOrFile: $(Build.ArtifactStagingDirectory)/publish
      includeRootFolder: false
      archiveType: zip
      archiveFile: $(Build.ArtifactStagingDirectory)/hello-world-api.zip
      replaceExistingArchive: true

  - task: PublishPipelineArtifact@1
    displayName: Upload deployment package
    inputs:
      targetPath: $(Build.ArtifactStagingDirectory)/hello-world-api.zip
      artifact: drop
